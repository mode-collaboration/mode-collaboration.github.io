name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'content/publication/**'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: '0.123.7'   # set to your local Hugo Extended version
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Go (for hugo-blox)
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install hugo-blox CLI
        run: |
          go install github.com/HugoBlox/hugo-blox-builder/cmd/hugo-blox@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Import publications from BibTeX
        run: |
          hugo-blox academic import --bibtex publications.bib content/publication

      - name: Commit imported publications (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/publication
          if git diff --cached --quiet; then
            echo "No publication changes to commit."
          else
            git commit -m "Auto-update publications from BibTeX"
            git push
          fi

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Build
        run: hugo --gc --minify

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4