name: Import Publications from BibTeX

on:
  push:
    branches: [ main ]
    paths:
      - 'publications.bib'

permissions:
  contents: write
  pull-requests: write

jobs:
  import-publications:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install academic CLI
        run: |
          python -m pip install --upgrade pip
          pip install -U academic

      - name: Import publications from BibTeX
        run: |
          academic import publications.bib content/publication/ --compact --overwrite

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: Auto-update publications from BibTeX
          branch: auto-update-publications
          delete-branch: true
          title: Auto-update publications from BibTeX
          body: Automated update of `content/publication` from `publications.bib`.